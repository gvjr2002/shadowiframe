<!DOCTYPE html>
<html>
<head>
  <title>Advanced Event Test Page</title>
  <style>
    body { font-family: Arial; margin: 0; }
    nav { background:#222; padding:15px; color:white; }
    nav button { margin-right:10px; }
    .page { display:none; padding:20px; }
    .active { display:block; }
    .box { width:200px;height:100px;background:#eee;margin:20px 0;padding:10px }
    #scrollArea { height:800px;background:linear-gradient(white,lightblue); }
    iframe { width:100%; height:200px; border:2px solid black; }
  </style>
</head>

<body>

<nav>
  SPA Navigation:
  <button onclick="navigate('home')">Home</button>
  <button onclick="navigate('form')">Form Page</button>
  <button onclick="navigate('shadow')">Shadow DOM</button>
</nav>

<!-- HOME PAGE -->
<div id="home" class="page active">
  <h2>Home Page</h2>

  <button id="clickBtn">Click / MouseDown Test</button>

  <div id="hoverBox" class="box">Hover over me</div>

  <div id="scrollArea">Scroll Down Area</div>

  <h3>Iframe Test</h3>
  <iframe srcdoc='
      <input id="iframeInput" placeholder="Focus inside iframe">
      <button onclick="alert(`Clicked inside iframe`)">Click Me</button>
  '></iframe>
</div>

<!-- FORM PAGE -->
<div id="form" class="page">
  <h2>Form Page</h2>

  <form id="testForm">
    <input id="fullName" placeholder="Full Name"><br><br>
    <input id="email" placeholder="Email"><br><br>
    <button type="submit">Submit Form</button>
  </form>

  <p id="formMsg"></p>
</div>

<!-- SHADOW DOM PAGE -->
<div id="shadow" class="page">
  <h2>Shadow DOM Page</h2>
  <div id="shadowHost"></div>
</div>

<script>
/* SPA NAVIGATION */
function navigate(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
  history.pushState({}, "", "#"+page);
}

/* CLICK + MOUSEDOWN */
document.getElementById("clickBtn").addEventListener("mousedown",()=>console.log("mousedown fired"));
document.getElementById("clickBtn").addEventListener("click",()=>console.log("click fired"));

/* HOVER */
document.getElementById("hoverBox").addEventListener("mouseover",()=>console.log("hover fired"));

/* SCROLL */
window.addEventListener("scroll",()=>console.log("scroll event fired"));

/* FORM SUBMIT */
document.getElementById("testForm").addEventListener("submit",(e)=>{
  e.preventDefault();
  document.getElementById("formMsg").innerText="Form submitted!";
});

/* FOCUS / BLUR */
document.addEventListener("focus", e => console.log("Focus:", e.target.id), true);
document.addEventListener("blur", e => console.log("Blur:", e.target.id), true);

/* SHADOW DOM */
const host = document.getElementById("shadowHost");
const shadow = host.attachShadow({ mode: "open" });

shadow.innerHTML = `
  <input id="shadowInput" placeholder="Shadow DOM Input">
  <button id="shadowBtn">Shadow Click</button>
`;

shadow.getElementById("shadowBtn").addEventListener("click", () =>
  console.log("Shadow button clicked")
);
</script>

</body>
</html>
